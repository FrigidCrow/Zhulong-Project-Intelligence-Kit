<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI-PIKit 项目生命周期</title>
  <desc id="desc">展示新项目、既存项目、文档更新、代码更新、任务闭环的命令顺序。</desc>
  <rect width="1200" height="720" fill="#080a0f"/>
  <text x="64" y="78" fill="#eef4ff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="850">Lifecycle Cheat Sheet</text>
  <text x="64" y="114" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="18">不同场景用不同起手式，避免把 init 当成“已经理解项目”。</text>

  <g font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="72" y="164" width="500" height="204" rx="10" fill="#10151d" stroke="#2b3a4d" stroke-width="2"/>
      <text x="104" y="206" fill="#87f7b5" font-size="26" font-weight="850">新项目</text>
      <text x="104" y="244" fill="#eef4ff" font-size="18">pik-init --mode new</text>
      <text x="104" y="278" fill="#a9b7c8" font-size="16">-> pik-codebase-scan</text>
      <text x="104" y="308" fill="#a9b7c8" font-size="16">-> pik-docs-scan</text>
      <text x="104" y="338" fill="#a9b7c8" font-size="16">-> pik-new-milestone</text>
    </g>
    <g>
      <rect x="628" y="164" width="500" height="204" rx="10" fill="#10151d" stroke="#66e8ff" stroke-width="3"/>
      <text x="660" y="206" fill="#66e8ff" font-size="26" font-weight="850">既存项目</text>
      <text x="660" y="244" fill="#eef4ff" font-size="18">pik-init --mode existing</text>
      <text x="660" y="278" fill="#a9b7c8" font-size="16">-> pik-codebase-scan  必须</text>
      <text x="660" y="308" fill="#a9b7c8" font-size="16">-> pik-docs-scan / normalize</text>
      <text x="660" y="338" fill="#a9b7c8" font-size="16">-> pik-graph-build --run</text>
    </g>
    <g>
      <rect x="72" y="420" width="320" height="174" rx="10" fill="#10151d" stroke="#2b3a4d" stroke-width="2"/>
      <text x="104" y="462" fill="#ffd166" font-size="24" font-weight="850">文档更新</text>
      <text x="104" y="500" fill="#a9b7c8" font-size="16">pik-docs-scan</text>
      <text x="104" y="530" fill="#a9b7c8" font-size="16">pik-docs-normalize</text>
      <text x="104" y="560" fill="#a9b7c8" font-size="16">pik-docs-index --run</text>
    </g>
    <g>
      <rect x="440" y="420" width="320" height="174" rx="10" fill="#10151d" stroke="#2b3a4d" stroke-width="2"/>
      <text x="472" y="462" fill="#ffd166" font-size="24" font-weight="850">代码更新</text>
      <text x="472" y="500" fill="#a9b7c8" font-size="16">pik-codebase-scan</text>
      <text x="472" y="530" fill="#a9b7c8" font-size="16">pik-graph-build --run</text>
      <text x="472" y="560" fill="#a9b7c8" font-size="16">pik-graph-diff</text>
    </g>
    <g>
      <rect x="808" y="420" width="320" height="174" rx="10" fill="#10151d" stroke="#2b3a4d" stroke-width="2"/>
      <text x="840" y="462" fill="#ffd166" font-size="24" font-weight="850">任务收口</text>
      <text x="840" y="500" fill="#a9b7c8" font-size="16">pik-verify-work</text>
      <text x="840" y="530" fill="#a9b7c8" font-size="16">pik-evidence-record</text>
      <text x="840" y="560" fill="#a9b7c8" font-size="16">pik-completion-check</text>
    </g>
  </g>
</svg>
