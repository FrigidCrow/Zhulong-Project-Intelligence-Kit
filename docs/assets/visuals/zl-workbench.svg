<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Zhulong 本地 AI 工程工作台</title>
  <desc id="desc">Codex、Claude Code、Copilot 通过 zl 命令进入 Zhulong CLI，Zhulong 连接项目文档、Graphify 代码地图、workflow guard 和 evidence。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.52" stop-color="#081018"/>
      <stop offset="1" stop-color="#12131c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66e8ff"/>
      <stop offset="1" stop-color="#87f7b5"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#66e8ff"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="260" cy="160" r="160" fill="#66e8ff" opacity="0.08"/>
  <circle cx="940" cy="560" r="180" fill="#ffd166" opacity="0.07"/>
  <text x="64" y="84" fill="#eef4ff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Zhulong Project Intelligence Kit</text>
  <text x="64" y="124" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="20">让 AI 在项目上下文、仕様依据、代码影响面和验证闭环里写代码</text>

  <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
    <rect x="72" y="210" width="230" height="86" rx="8"/>
    <rect x="72" y="322" width="230" height="86" rx="8"/>
    <rect x="72" y="434" width="230" height="86" rx="8"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="104" y="246" fill="#eef4ff" font-size="24" font-weight="750">Codex</text>
    <text x="104" y="274" fill="#a9b7c8" font-size="16">$zl-debug</text>
    <text x="104" y="358" fill="#eef4ff" font-size="24" font-weight="750">Claude Code</text>
    <text x="104" y="386" fill="#a9b7c8" font-size="16">/zl-plan-phase</text>
    <text x="104" y="470" fill="#eef4ff" font-size="24" font-weight="750">GitHub Copilot</text>
    <text x="104" y="498" fill="#a9b7c8" font-size="16">/zl-verify-work</text>
  </g>

  <g filter="url(#glow)">
    <rect x="432" y="224" width="320" height="250" rx="18" fill="#0f1b26" stroke="url(#accent)" stroke-width="3"/>
  </g>
  <text x="470" y="286" fill="#eef4ff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">Zhulong CLI</text>
  <text x="470" y="324" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="18">稳定入口：zl-*</text>
  <rect x="470" y="354" width="244" height="42" rx="7" fill="#071018" stroke="#2b3a4d"/>
  <text x="494" y="382" fill="#87f7b5" font-family="SFMono-Regular, Consolas, monospace" font-size="17">workflow guard</text>
  <rect x="470" y="408" width="244" height="42" rx="7" fill="#071018" stroke="#2b3a4d"/>
  <text x="494" y="436" fill="#66e8ff" font-family="SFMono-Regular, Consolas, monospace" font-size="17">local artifacts</text>

  <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
    <rect x="884" y="146" width="240" height="76" rx="8"/>
    <rect x="884" y="250" width="240" height="76" rx="8"/>
    <rect x="884" y="354" width="240" height="76" rx="8"/>
    <rect x="884" y="458" width="240" height="76" rx="8"/>
    <rect x="884" y="562" width="240" height="76" rx="8"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="916" y="178" fill="#eef4ff" font-size="21" font-weight="750">仕様 / QA / 議事録</text>
    <text x="916" y="202" fill="#a9b7c8" font-size="15">.planning/knowledge</text>
    <text x="916" y="282" fill="#eef4ff" font-size="21" font-weight="750">GraphRAG / RAG</text>
    <text x="916" y="306" fill="#a9b7c8" font-size="15">index / query handoff</text>
    <text x="916" y="386" fill="#eef4ff" font-size="21" font-weight="750">Graphify</text>
    <text x="916" y="410" fill="#a9b7c8" font-size="15">code map / impact</text>
    <text x="916" y="490" fill="#eef4ff" font-size="21" font-weight="750">Evidence</text>
    <text x="916" y="514" fill="#a9b7c8" font-size="15">test / proof / writeback</text>
    <text x="916" y="594" fill="#eef4ff" font-size="21" font-weight="750">Completion gates</text>
    <text x="916" y="618" fill="#a9b7c8" font-size="15">allowed / blocked</text>
  </g>

  <g fill="none" stroke="#66e8ff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9">
    <path d="M302 253 C355 253 370 300 424 300"/>
    <path d="M302 365 C355 365 370 350 424 350"/>
    <path d="M302 477 C355 477 370 408 424 408"/>
    <path d="M752 300 C820 258 826 184 876 184"/>
    <path d="M752 328 C820 314 826 288 876 288"/>
    <path d="M752 356 C820 366 826 392 876 392"/>
    <path d="M752 392 C820 436 826 496 876 496"/>
    <path d="M752 424 C820 512 826 600 876 600"/>
  </g>

  <rect x="432" y="548" width="320" height="70" rx="8" fill="#070b10" stroke="#2b3a4d"/>
  <text x="462" y="578" fill="#eef4ff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="750">目标项目内流通</text>
  <text x="462" y="604" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="15">AGENTS.md / project.manifest.yml / .planning/</text>
</svg>
