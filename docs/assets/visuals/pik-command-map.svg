<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI-PIKit 命令地图</title>
  <desc id="desc">AI-PIKit 命令按初始化、代码基线、文档、Graphify、workflow、evidence、runtime 分类。</desc>
  <rect width="1200" height="760" fill="#080a0f"/>
  <text x="64" y="76" fill="#eef4ff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="850">AI-PIKit Command Map</text>
  <text x="64" y="112" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="18">日常不用记全部命令，按任务阶段走这张图。</text>

  <g stroke-width="4" fill="none">
    <path d="M160 196 H1010" stroke="#66e8ff"/>
    <path d="M160 314 H1010" stroke="#87f7b5"/>
    <path d="M160 432 H1010" stroke="#ffd166"/>
    <path d="M160 550 H1010" stroke="#84a7ff"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
      <rect x="86" y="160" width="170" height="72" rx="8"/>
      <rect x="306" y="160" width="205" height="72" rx="8"/>
      <rect x="562" y="160" width="190" height="72" rx="8"/>
      <rect x="804" y="160" width="240" height="72" rx="8"/>
    </g>
    <text x="118" y="190" fill="#eef4ff" font-weight="800">初始化</text>
    <text x="118" y="214" fill="#a9b7c8" font-size="14">init / verify / map</text>
    <text x="338" y="190" fill="#eef4ff" font-weight="800">代码基线</text>
    <text x="338" y="214" fill="#a9b7c8" font-size="14">codebase-scan / status</text>
    <text x="594" y="190" fill="#eef4ff" font-weight="800">文档/RAG</text>
    <text x="594" y="214" fill="#a9b7c8" font-size="14">scan / query / index</text>
    <text x="836" y="190" fill="#eef4ff" font-weight="800">Graphify</text>
    <text x="836" y="214" fill="#a9b7c8" font-size="14">build / query / diff</text>

    <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
      <rect x="86" y="278" width="210" height="72" rx="8"/>
      <rect x="346" y="278" width="210" height="72" rx="8"/>
      <rect x="606" y="278" width="210" height="72" rx="8"/>
      <rect x="866" y="278" width="210" height="72" rx="8"/>
    </g>
    <text x="118" y="308" fill="#eef4ff" font-weight="800">spec / discuss</text>
    <text x="118" y="332" fill="#a9b7c8" font-size="14">需求和决策</text>
    <text x="378" y="308" fill="#eef4ff" font-weight="800">plan</text>
    <text x="378" y="332" fill="#a9b7c8" font-size="14">计划和风险</text>
    <text x="638" y="308" fill="#eef4ff" font-weight="800">execute</text>
    <text x="638" y="332" fill="#a9b7c8" font-size="14">实施改修</text>
    <text x="898" y="308" fill="#eef4ff" font-weight="800">verify</text>
    <text x="898" y="332" fill="#a9b7c8" font-size="14">验证结果</text>

    <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
      <rect x="86" y="396" width="246" height="72" rx="8"/>
      <rect x="382" y="396" width="246" height="72" rx="8"/>
      <rect x="678" y="396" width="246" height="72" rx="8"/>
    </g>
    <text x="118" y="426" fill="#eef4ff" font-weight="800">workflow-status</text>
    <text x="118" y="450" fill="#a9b7c8" font-size="14">看当前卡在哪里</text>
    <text x="414" y="426" fill="#eef4ff" font-weight="800">workflow-continue</text>
    <text x="414" y="450" fill="#a9b7c8" font-size="14">标记人工 gate</text>
    <text x="710" y="426" fill="#eef4ff" font-weight="800">completion-check</text>
    <text x="710" y="450" fill="#a9b7c8" font-size="14">最终 allowed / blocked</text>

    <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
      <rect x="86" y="514" width="246" height="72" rx="8"/>
      <rect x="382" y="514" width="246" height="72" rx="8"/>
      <rect x="678" y="514" width="246" height="72" rx="8"/>
    </g>
    <text x="118" y="544" fill="#eef4ff" font-weight="800">evidence-record</text>
    <text x="118" y="568" fill="#a9b7c8" font-size="14">验证证据</text>
    <text x="414" y="544" fill="#eef4ff" font-weight="800">runtime-install</text>
    <text x="414" y="568" fill="#a9b7c8" font-size="14">Codex / Claude / Copilot</text>
    <text x="710" y="544" fill="#eef4ff" font-weight="800">complete-milestone</text>
    <text x="710" y="568" fill="#a9b7c8" font-size="14">阶段收口</text>
  </g>

  <rect x="86" y="638" width="990" height="64" rx="8" fill="#121922" stroke="#2b3a4d"/>
  <text x="118" y="678" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="17">经验规则：既存项目先 codebase；文档变化先 docs；代码影响面先 graph；完成前一定 evidence + completion-check。</text>
</svg>
