<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Zhulong Artifact Map</title>
  <desc id="desc">展示 .planning 中 codebase、knowledge、graphs、workflows、evidence 的文件落点和用途。</desc>
  <rect width="1200" height="720" fill="#080a0f"/>
  <text x="64" y="78" fill="#eef4ff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="850">Artifact Map</text>
  <text x="64" y="114" fill="#a9b7c8" font-family="Inter, Arial, sans-serif" font-size="18">Zhulong 的可信度来自这些可打开、可检查、可复跑的本地文件。</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="470" y="168" width="260" height="82" rx="10" fill="#071018" stroke="#66e8ff" stroke-width="3"/>
    <text x="528" y="204" fill="#eef4ff" font-size="25" font-weight="850">.planning/</text>
    <text x="522" y="232" fill="#a9b7c8" font-size="15">Zhulong intelligence layer</text>

    <g fill="none" stroke="#2b3a4d" stroke-width="3">
      <path d="M600 250 V318"/>
      <path d="M210 318 H990"/>
      <path d="M210 318 V370"/>
      <path d="M405 318 V370"/>
      <path d="M600 318 V370"/>
      <path d="M795 318 V370"/>
      <path d="M990 318 V370"/>
    </g>

    <g fill="#121922" stroke="#2b3a4d" stroke-width="2">
      <rect x="96" y="370" width="228" height="178" rx="9"/>
      <rect x="291" y="370" width="228" height="178" rx="9"/>
      <rect x="486" y="370" width="228" height="178" rx="9"/>
      <rect x="681" y="370" width="228" height="178" rx="9"/>
      <rect x="876" y="370" width="228" height="178" rx="9"/>
    </g>
    <text x="124" y="410" fill="#87f7b5" font-size="22" font-weight="800">codebase/</text>
    <text x="124" y="442" fill="#a9b7c8" font-size="14">CODEBASE_STATUS.md</text>
    <text x="124" y="468" fill="#a9b7c8" font-size="14">STRUCTURE.md</text>
    <text x="124" y="494" fill="#a9b7c8" font-size="14">STACK.md / TESTING.md</text>

    <text x="319" y="410" fill="#87f7b5" font-size="22" font-weight="800">knowledge/</text>
    <text x="319" y="442" fill="#a9b7c8" font-size="14">RAG_SOURCES.md</text>
    <text x="319" y="468" fill="#a9b7c8" font-size="14">normalized/</text>
    <text x="319" y="494" fill="#a9b7c8" font-size="14">RAG_QUERY_RESULT.md</text>

    <text x="514" y="410" fill="#87f7b5" font-size="22" font-weight="800">graphs/</text>
    <text x="514" y="442" fill="#a9b7c8" font-size="14">graph.json</text>
    <text x="514" y="468" fill="#a9b7c8" font-size="14">GRAPH_REPORT.md</text>
    <text x="514" y="494" fill="#a9b7c8" font-size="14">GRAPH_DIFF.md</text>

    <text x="709" y="410" fill="#87f7b5" font-size="22" font-weight="800">workflows/</text>
    <text x="709" y="442" fill="#a9b7c8" font-size="14">WORKFLOW_STATE.json</text>
    <text x="709" y="468" fill="#a9b7c8" font-size="14">WORKFLOW_STATE.md</text>
    <text x="709" y="494" fill="#a9b7c8" font-size="14">active workflow</text>

    <text x="904" y="410" fill="#87f7b5" font-size="22" font-weight="800">evidence/</text>
    <text x="904" y="442" fill="#a9b7c8" font-size="14">INDEX.md</text>
    <text x="904" y="468" fill="#a9b7c8" font-size="14">test result records</text>
    <text x="904" y="494" fill="#a9b7c8" font-size="14">writeback links</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="96" y="594" width="1008" height="62" rx="8" fill="#121922" stroke="#2b3a4d"/>
    <text x="126" y="632" fill="#a9b7c8" font-size="17">如果某个能力说“接入了”，先找它对应的 artifact；找不到，就不能算真正接入。</text>
  </g>
</svg>
