name: Zhulong CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zhulong-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-smoke:
    name: platform-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Pin npm 11
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run cross-platform smoke
        run: |
          npm run check
          node bin/zl.mjs --help
          npm run verify:project-profiles

  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
          package-manager-cache: false

      - name: Pin npm 11
        run: npm install --global npm@11.18.0

      - name: Show toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run quality gate
        run: npm run verify:ci

      - name: Audit npm package contents
        run: |
          mkdir -p verification/reports
          npm pack --dry-run --json > verification/reports/npm-pack.json
          npm run verify:pack-report -- verification/reports/npm-pack.json

      - name: Collect verifier reports
        if: always()
        run: npm run ci:collect-artifacts

      - name: Upload verifier reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zhulong-verifier-reports-${{ github.run_id }}
          path: ci-artifacts/
          if-no-files-found: error
          retention-days: 7
